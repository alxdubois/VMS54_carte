<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

        <style>
            html, body, #map {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
            }

            /* Style du titre flottant */
            .map-header-title {
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                padding: 12px 25px;
                border-radius: 8px;
                box-shadow: 0 2px 15px rgba(0,0,0,0.2);
                border: 1px solid #1a237e;
                text-align: center;
                pointer-events: none;
                min-width: 300px;
            }

            .map-header-title h1 {
                margin: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 18px;
                color: #1a237e;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* Bouton Export Excel en bas à gauche */
            #export-btn {
                position: absolute;
                bottom: 25px;
                left: 10px;
                z-index: 1000;
                background: #2e7d32;
                color: white;
                border: 2px solid white;
                padding: 12px 18px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                display: flex;
                align-items: center;
                gap: 10px;
                transition: all 0.2s ease;
            }
            #export-btn:hover {
                background: #1b5e20;
                transform: translateY(-2px);
                box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            }
            #export-btn i { font-size: 18px; }

            /* Légende et badges */
            .legend-title {
                font-weight: bold;
                font-size: 14px;
                color: #1a237e;
                margin-bottom: 8px;
                display: block;
                border-bottom: 2px solid #1a237e;
                padding-bottom: 3px;
            }

            .leaflet-layerstree-header-pointer { cursor: default !important; }
            .leaflet-layerstree-header-pointer span { display: none !important; }

            .etab-count-badge {
                display: inline-block;
                min-width: 22px;
                padding: 1px 6px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: bold;
                color: #fff;
                background: #555;
                text-align: center;
                margin-left: 6px;
                vertical-align: middle;
                line-height: 16px;
            }
            .etab-count-badge.zero { background: #bbb; opacity: 0.6; }

            /* Adaptation mobile */
            @media (max-width: 600px) {
                .map-header-title {
                    width: 90%;
                    padding: 8px 15px;
                    top: 5px;
                }
                .map-header-title h1 { font-size: 14px; }
                #export-btn { bottom: 30px; padding: 10px 14px; font-size: 13px; }
            }
        </style>
        <title>Les écoles à proximité des Voies SNCF (Grand Est)</title>
    </head>
    <body>
        <div class="map-header-title">
            <h1>Les écoles à proximité des Voies SNCF (Grand Est)</h1>
        </div>

        <button id="export-btn">
            <i class="fas fa-file-excel"></i> EXPORTER LA SÉLECTION (EXCEL)
        </button>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
        <!-- Bibliothèque XLSX pour l'export sans serveur -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <script src="data/geo_voies_2.js"></script>
        <script src="data/Typetablissement_3.js"></script>

        <script>
        // --- TRADUCTION FRANCAISE LEAFLET DRAW ---
        L.drawLocal = {
            draw: {
                toolbar: {
                    actions: { title: 'Annuler le dessin', text: 'Annuler' },
                    finish: { title: 'Terminer le dessin', text: 'Terminer' },
                    undo: { title: 'Supprimer le dernier point', text: 'Supprimer dernier point' },
                    buttons: {
                        polyline: 'Dessiner une ligne',
                        polygon: 'Dessiner un polygone pour compter/exporter',
                        rectangle: 'Dessiner un rectangle pour compter/exporter',
                        circle: 'Dessiner un cercle',
                        marker: 'Placer un marqueur',
                        circlemarker: 'Placer un marqueur circulaire'
                    }
                },
                handlers: {
                    circle: { tooltip: { start: 'Cliquez et glissez pour dessiner un cercle.' } },
                    circlemarker: { tooltip: { start: 'Cliquez sur la carte pour placer un marqueur circulaire.' } },
                    marker: { tooltip: { start: 'Cliquez sur la carte pour placer un marqueur.' } },
                    polygon: { tooltip: { start: 'Cliquez pour commencer à dessiner une zone.', cont: 'Cliquez pour continuer à dessiner la zone.', end: 'Cliquez sur le premier point pour fermer la zone.' } },
                    polyline: { tooltip: { start: 'Cliquez pour commencer à dessiner une ligne.', cont: 'Cliquez pour continuer à dessiner la ligne.', end: 'Cliquez sur le dernier point pour terminer la ligne.' } },
                    rectangle: { tooltip: { start: 'Cliquez et glissez pour dessiner un rectangle.' } },
                    simpleshape: { tooltip: { end: 'Relâchez la souris pour finir le dessin.' } }
                }
            },
            edit: {
                toolbar: {
                    actions: { save: { title: 'Enregistrer les modifications', text: 'Enregistrer' }, cancel: { title: 'Annuler les modifications', text: 'Annuler' }, clearAll: { title: 'Effacer toutes les zones', text: 'Tout effacer' } },
                    buttons: { edit: 'Modifier la zone', editDisabled: 'Rien à modifier', remove: 'Supprimer la zone', removeDisabled: 'Rien à supprimer' }
                },
                handlers: {
                    edit: { tooltip: { text: 'Faites glisser les poignées pour modifier la zone.', subtext: 'Cliquez sur annuler pour rejeter les modifications.' } },
                    remove: { tooltip: { text: 'Cliquez sur une zone pour la supprimer.' } }
                }
            }
        };

        var map = L.map('map', { zoomControl:false, maxZoom:28, minZoom:1 })
            .fitBounds([[47.58813635120763,7.537185090719699],[47.60294203369061,7.576745139155792]]);
        
        var hash = new L.Hash(map);
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true; audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true; video.src = src;
                    video.style.width = "400px"; video.style.height = "300px";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                }
            }
        }

        // --- Couches de base ---
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { pane: 'pane_GoogleSatellite_0', opacity: 1.0, minZoom: 1, maxZoom: 28 }).addTo(map);

        map.createPane('pane_GoogleTerrain_1');
        map.getPane('pane_GoogleTerrain_1').style.zIndex = 401;
        var layer_GoogleTerrain_1 = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', { pane: 'pane_GoogleTerrain_1', opacity: 1.0, minZoom: 1, maxZoom: 28 }).addTo(map);

        // --- Voies SNCF ---
        function pop_geo_voies_2(feature, layer) {
            var popupContent = '<table>' +
                '<tr><td colspan="2">' + (feature.properties['id_armen'] !== null ? autolinker.link(String(feature.properties['id_armen']).toLocaleString()) : '') + '</td></tr>' +
                '<tr><td colspan="2">' + (feature.properties['voie'] !== null ? autolinker.link(String(feature.properties['voie']).toLocaleString()) : '') + '</td></tr>' +
                '</table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        map.createPane('pane_geo_voies_2');
        map.getPane('pane_geo_voies_2').style.zIndex = 402;
        var layer_geo_voies_2 = new L.geoJson(json_geo_voies_2, {
            pane: 'pane_geo_voies_2',
            style: { color: '#000000', weight: 3.0, interactive: false },
            onEachFeature: pop_geo_voies_2
        }).addTo(map);

        // --- Établissements (Version avec Street View Link) ---
        function makeStyledPopup(p) {
            var statutColor = '#2196F3', statutIcon = '🏛️';
            if (p['statut_public_prive'] && p['statut_public_prive'].toLowerCase().includes('priv')) { statutColor = '#9C27B0'; statutIcon = '🏫'; }
            var typeColorsPopup = {'Ecole primaire':'#33A02C','Ecole maternelle':'#FDBF6F','Collège':'#1F78B4','Lycée':'#E31A1C','Autre':'#FD6FF2'};
            var typeColor = typeColorsPopup[p['Type_etab']] || '#999';
            
            var adresse = (p['adresse_1'] || '') + ' ' + (p['code_postal']||'') + ' ' + (p['nom_commune']||'');
            var svLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(adresse);

            return '<div style="font-family:Arial,sans-serif;min-width:260px;padding:5px;">' +
                '<div style="font-size:17px;font-weight:bold;color:#1a237e;margin-bottom:8px;">🏫 ' + (p['nom_etablissement']||'N/A') + '</div>' +
                
                '<a href="' + svLink + '" target="_blank" style="text-decoration:none;">' +
                    '<div style="width:100%; background:#f1f3f4; border:1px solid #dadce0; border-radius:8px; padding:10px; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:10px; color:#1a73e8; font-weight:bold;">' +
                        '<i class="fas fa-street-view" style="font-size:20px;"></i>' +
                        '<span>Voir sur Google Maps / Street View ↗</span>' +
                    '</div>' +
                '</a>' +

                '<div style="display:flex;gap:6px;margin-bottom:10px;">' +
                    '<span style="background:' + statutColor + ';color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">' + statutIcon + ' ' + (p['statut_public_prive']||'N/A') + '</span>' +
                    '<span style="background:' + typeColor + ';color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">📋 ' + (p['Type_etab']||'N/A') + '</span>' +
                '</div>' +
                '<hr style="border:none;border-top:1px solid #e0e0e0;margin:6px 0;">' +
                '<div style="font-size:13px;color:#444;margin-bottom:6px;">📍 ' + adresse + '</div>' +
                '<div style="font-size:15px;font-weight:bold;color:#c62828;">📞 ' + (p['telephone']||'Non renseigné') + '</div>' +
                '<div style="font-size:13px;">✉️ <a href="mailto:' + (p['mail']||'') + '">' + (p['mail']||'Non renseigné') + '</a></div>' +
            '</div>';
        }

        map.createPane('pane_Typetablissement_3');
        map.getPane('pane_Typetablissement_3').style.zIndex = 403;
        var layer_Typetablissement_3 = new L.geoJson(json_Typetablissement_3, {
            pane: 'pane_Typetablissement_3',
            onEachFeature: function(feature, layer) {
                var content = makeStyledPopup(feature.properties);
                layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
                layer.bindPopup(content, { maxHeight: 400 });
            },
            pointToLayer: function (feature, latlng) {
                var t = feature.properties['Type_etab'];
                var c = 'rgba(253,111,242,1.0)';
                if (t==='Ecole primaire') c='rgba(51,160,44,1.0)';
                else if (t==='Collège') c='rgba(31,120,180,1.0)';
                else if (t==='Lycée') c='rgba(227,26,28,1.0)';
                else if (t==='Ecole maternelle') c='rgba(253,191,111,1.0)';
                return L.circleMarker(latlng, { radius:6, opacity:1, color:'#232323', weight:1, fill:true, fillOpacity:0.5, fillColor:c, interactive:true });
            }
        }).addTo(map);

        // --- Outils de Dessin ---
        var drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({
            draw: { polygon: true, rectangle: true, circle: false, marker: false, circlemarker: false, polyline: false },
            edit: { featureGroup: drawnItems, remove: true }
        }).addTo(map);

        var currentSelection = null;
        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers();
            currentSelection = e.layer;
            drawnItems.addLayer(currentSelection);
            updateCounters();
        });
        map.on(L.Draw.Event.DELETED, function () { currentSelection = null; updateCounters(); });

        // --- Logique de Filtrage, Comptage et Export ---
        var typeFilterState = { 'Ecole primaire':true, 'Ecole maternelle':true, 'Collège':true, 'Lycée':true, 'Autre':true };
        var legendToType = { 'Primaires':'Ecole primaire', 'Maternelle':'Ecole maternelle', 'Collèges':'Collège', 'Lycées':'Lycée', 'Autres':'Autre' };
        var typeColors = { 'Ecole primaire':'#33A02C', 'Ecole maternelle':'#c8930a', 'Collège':'#1F78B4', 'Lycée':'#E31A1C', 'Autre':'#c060d0' };

        function isPointInPolygon(latlng, layer) {
            var pts = layer.getLatLngs()[0];
            if (Array.isArray(pts[0])) pts = pts[0];
            var x = latlng.lat, y = latlng.lng, inside = false;
            for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                var xi = pts[i].lat, yi = pts[i].lng, xj = pts[j].lat, yj = pts[j].lng;
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function updateCounters() {
            var counts = { 'Ecole primaire':0, 'Ecole maternelle':0, 'Collège':0, 'Lycée':0, 'Autre':0 };
            var bounds = map.getBounds();
            
            layer_Typetablissement_3.eachLayer(function(m) {
                var inside = currentSelection ? isPointInPolygon(m.getLatLng(), currentSelection) : bounds.contains(m.getLatLng());
                if (inside) {
                    var t = m.feature.properties['Type_etab'] || 'Autre';
                    if (counts.hasOwnProperty(t)) counts[t]++; else counts['Autre']++;
                }
            });

            document.querySelectorAll('.etab-count-badge').forEach(function(b) {
                var type = b.getAttribute('data-type');
                b.textContent = counts[type] || 0;
                b.classList.toggle('zero', (counts[type] || 0) === 0);
            });
        }

        function applyTypeFilter() {
            layer_Typetablissement_3.eachLayer(function(m) {
                var show = typeFilterState[m.feature.properties['Type_etab']] !== false;
                if (m.setStyle) m.setStyle({opacity: show?1:0, fillOpacity: show?1:0, interactive: show});
            });
            updateCounters();
        }

        // --- Logique du Bouton Export Excel ---
        document.getElementById('export-btn').onclick = function() {
            var dataToExport = [];
            var bounds = map.getBounds();
            
            layer_Typetablissement_3.eachLayer(function(layer) {
                var feature = layer.feature;
                // On vérifie si le type est actuellement activé dans les filtres
                if (typeFilterState[feature.properties['Type_etab']] !== false) {
                    var inside = currentSelection ? isPointInPolygon(layer.getLatLng(), currentSelection) : bounds.contains(layer.getLatLng());
                    if (inside) {
                        dataToExport.push(feature.properties);
                    }
                }
            });

            if (dataToExport.length === 0) {
                alert("Aucun établissement trouvé dans la sélection actuelle.");
                return;
            }

            // Conversion et téléchargement Excel
            var ws = XLSX.utils.json_to_sheet(dataToExport);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Écoles");
            XLSX.writeFile(wb, "Export_Ecoles_SNCF.xlsx");
        };

        // --- Contrôles de l'interface ---
        L.control.zoom({ position: 'topleft' }).addTo(map);
        new L.Control.Measure({ position: 'topleft', primaryLengthUnit: 'meters' }).addTo(map);

        var overlaysTree = [
            {label: 'Type établissement<br /><table><tr><td><img src="legend/Typetablissement_3_Primaires0.png" /></td><td>Primaires</td></tr><tr><td><img src="legend/Typetablissement_3_Collèges1.png" /></td><td>Collèges</td></tr><tr><td><img src="legend/Typetablissement_3_Lycées2.png" /></td><td>Lycées</td></tr><tr><td><img src="legend/Typetablissement_3_Maternelle3.png" /></td><td>Maternelle</td></tr><tr><td><img src="legend/Typetablissement_3_Autres4.png" /></td><td>Autres</td></tr></table>', layer: layer_Typetablissement_3},
            {label: 'Voies SNCF', layer: layer_geo_voies_2},
            {label: "Google Terrain", layer: layer_GoogleTerrain_1},
            {label: "Google Satellite", layer: layer_GoogleSatellite_0}
        ];
        L.control.layers.tree(null, overlaysTree, { collapsed: false }).addTo(map);

        function injectLegendCheckboxes() {
            var layersContainer = document.querySelector('.leaflet-control-layers-list');
            if (layersContainer && !document.getElementById('legend-header')) {
                var header = document.createElement('div');
                header.id = 'legend-header';
                header.className = 'legend-title';
                header.textContent = 'LÉGENDE';
                layersContainer.prepend(header);
            }

            document.querySelectorAll('.leaflet-control-layers td').forEach(function(td) {
                var label = td.textContent.trim();
                if (legendToType[label] && !td.querySelector('input')) {
                    var typeVal = legendToType[label];
                    var badge = document.createElement('span');
                    badge.className = 'etab-count-badge'; badge.setAttribute('data-type', typeVal);
                    badge.textContent = '0'; badge.style.background = typeColors[typeVal];
                    td.appendChild(badge);
                    var cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.checked = true; cb.style.marginLeft = '6px';
                    cb.onclick = function(e) { e.stopPropagation(); typeFilterState[typeVal] = cb.checked; applyTypeFilter(); };
                    td.appendChild(cb);
                }
            });
        }

        map.on('moveend zoomend', updateCounters);
        setTimeout(function() { injectLegendCheckboxes(); updateCounters(); }, 1000);
        </script>
    </body>
</html>
