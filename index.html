        var map = L.map('map', {

        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

                    <tr><td colspan="2">' + (feature.properties['garde'] !== null ? autolinker.link(String(feature.properties['garde']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\

        bounds_group.addLayer(layer_geo_voies_2);

        function makeStyledPopup(p, latlng) {
            var statutColor = '#2196F3', statutIcon = '🏛️';
            if (p['statut_public_prive'] && p['statut_public_prive'].toLowerCase().includes('priv')) {

            }

            // Construction du lien Google Maps dynamique
            var gmapsUrl = "https://www.google.com/maps/search/?api=1&query=" + latlng.lat + "," + latlng.lng;

            return '<div style="font-family:Arial,sans-serif;min-width:260px;max-width:300px;padding:5px;">' +

                '</div>' +
                '<hr style="border:none;border-top:1px solid #e0e0e0;margin:6px 0;">' +

                '<div style="font-size:15px;font-weight:bold;color:#c62828;margin-bottom:5px;">📞 ' + (p['telephone']||'Non renseigné') + '</div>' +

                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');

                    var layersListElement = document.querySelector('.leaflet-control-layers-list');

            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight();
            });
            if (controlLayersElement) {
                controlLayersElement.addEventListener('click', function(event) {
                    var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
                    if (toggleLayerHeaderPointer) { newLayersListHeight(); }
                });
            }
            setTimeout(function() { toggleLayerControl.click(); }, 10);
            setTimeout(function() { toggleLayerControl.click(); }, 10);
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }
        });

        setBounds();

        // ============================================================
        // FILTRES ORIGINAUX + ÉTAT GLOBAL
        // ============================================================

        var typeFilterState = {
            'Ecole primaire':   true,
            'Ecole maternelle': true,
            'Collège':          true,
            'Lycée':            true,
            'Autre':            true
        };
        var legendToType = {
            'Primaires':  'Ecole primaire',
            'Maternelle': 'Ecole maternelle',
            'Collèges':   'Collège',
            'Lycées':     'Lycée',
            'Autres':     'Autre'
        };

        var pubPrivState   = { 'Public': true, 'Privé': true };
        var geoFilterLayer = null;
        var drawnItems     = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var clearGeoBtnEl = null;

        // ============================================================
        // UTILITAIRE : point dans polygone (ray casting)
        // ============================================================
        function pointInPolygon(latlng, polygonLayer) {
            var latlngs = polygonLayer.getLatLngs();
            var ring = latlngs;
            if (Array.isArray(latlngs[0])) ring = latlngs[0];
            if (ring[0] && ring[0].lat === undefined && Array.isArray(ring[0])) ring = ring[0];
            var x = latlng.lat, y = latlng.lng, inside = false;
            for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                var xi = ring[i].lat, yi = ring[i].lng;
                var xj = ring[j].lat, yj = ring[j].lng;
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // ============================================================
        // MISE À JOUR DU PANNEAU DE LA LÉGENDE AVEC COMPTEURS
        // ============================================================
        function updateStatsInLegend() {
            var counts = { 'Ecole primaire': 0, 'Ecole maternelle': 0, 'Collège': 0, 'Lycée': 0, 'Autre': 0 };
            var pubPrivCounts = { 'Public': 0, 'Privé': 0 };
            
            layer_Typetablissement_3.eachLayer(function(mkr) {
                if (!mkr.feature || !mkr.feature.properties) return;
                var t      = mkr.feature.properties['Type_etab'] || '';
                var statut = (mkr.feature.properties['statut_public_prive'] || '').toLowerCase();
                var isPriv = statut.includes('priv');
                
                var showType   = typeFilterState[t] !== false;
                var showStatut = isPriv ? pubPrivState['Privé'] : pubPrivState['Public'];
                var showGeo    = true;
                if (geoFilterLayer) {
                    try { showGeo = pointInPolygon(mkr.getLatLng(), geoFilterLayer); } catch(e) { showGeo = true; }
                }
                
                if (showType && showStatut && showGeo) {
                    var key = counts.hasOwnProperty(t) ? t : 'Autre';
                    counts[key]++;
                    if (isPriv) { pubPrivCounts['Privé']++; } else { pubPrivCounts['Public']++; }
                }
            });

            Object.keys(legendToType).forEach(function(legendLabel) {
                var typeKey = legendToType[legendLabel];
                var cells = document.querySelectorAll('.legend-type-td');
                cells.forEach(function(td) {
                    if (td.getAttribute('data-type') === legendLabel) {
                        var counterSpan = td.querySelector('.legend-counter');
                        if (!counterSpan) {
                            counterSpan = document.createElement('span');
                            counterSpan.className = 'legend-counter';
                            td.appendChild(counterSpan);
                        }
                        counterSpan.textContent = counts[typeKey];
                    }
                });
            });

            ['Public', 'Privé'].forEach(function(statut) {
                var badge = document.getElementById('badge-count-' + statut);
                if (badge) {
                    badge.textContent = pubPrivCounts[statut];
                }
            });

            if (clearGeoBtnEl) clearGeoBtnEl.style.display = geoFilterLayer ? 'block' : 'none';
        }

        // ============================================================
        // FILTRE UNIFIÉ
        // ============================================================
        function applyTypeFilter() {
            layer_Typetablissement_3.eachLayer(function(mkr) {
                if (!mkr.feature || !mkr.feature.properties) return;
                var t      = mkr.feature.properties['Type_etab'] || '';
                var statut = (mkr.feature.properties['statut_public_prive'] || '').toLowerCase();
                var isPriv = statut.includes('priv');
                var showType   = typeFilterState[t] !== false;
                var showStatut = isPriv ? pubPrivState['Privé'] : pubPrivState['Public'];
                var showGeo    = true;
                if (geoFilterLayer) {
                    try { showGeo = pointInPolygon(mkr.getLatLng(), geoFilterLayer); } catch(e) { showGeo = true; }
                }
                var show = showType && showStatut && showGeo;
                if (mkr.setStyle) mkr.setStyle({ opacity: show ? 0.9 : 0, fillOpacity: show ? 0.8 : 0 });
                if (mkr._icon) mkr._icon.style.display = show ? '' : 'none';
            });
            updateStatsInLegend();
        }

        // ============================================================
        // INJECTION CHECKBOXES TYPE dans la légende
        // ============================================================
        function injectLegendCheckboxes() {
            var tds = document.querySelectorAll('.leaflet-control-layers td');
            tds.forEach(function(td) {
                var label = td.textContent.trim();
                if (legendToType[label] && !td.querySelector('input')) {
                    var typeVal = legendToType[label];
                    var cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = true;
                    cb.title = 'Afficher / masquer';
                    cb.style.cssText = 'cursor:pointer;margin-left:5px;vertical-align:middle;width:14px;height:14px;';
                    cb.addEventListener('change', function(e) {
                        e.stopPropagation();
                        typeFilterState[typeVal] = cb.checked;
                        td.closest('tr').style.opacity = cb.checked ? '1' : '0.4';
                        applyTypeFilter();
                    });
                    cb.addEventListener('click', function(e) { e.stopPropagation(); });
                    td.appendChild(cb);
                }
            });
        }

        // ============================================================
        // INJECTION SECTION PUBLIC/PRIVÉ + ACTION CLOSING
        // ============================================================
        function injectPubPrivIntoLegend() {
            var container = document.querySelector('.leaflet-control-layers');
            var layersList = document.querySelector('.leaflet-control-layers-list');
            if (!layersList || document.getElementById('pubpriv-legend-section')) return;

            var titleBar = document.createElement('div');
            titleBar.style.cssText = 'background:#1a237e;color:white;padding:6px 10px;font-weight:bold;font-size:12px;cursor:pointer;border-radius:4px 4px 0 0;margin:-10px -10px 10px -10px;display:flex;justify-content:between;align-items:center;';
            titleBar.innerHTML = '<span>🗺️ Légende & Filtres</span>';
            
            titleBar.addEventListener('click', function(e) {
                e.stopPropagation();
                if (container.classList.contains('leaflet-control-layers-expanded')) {
                    container.classList.remove('leaflet-control-layers-expanded');
                } else {
                    container.classList.add('leaflet-control-layers-expanded');
                }
            });
            layersList.insertBefore(titleBar, layersList.firstChild);

            var section = document.createElement('div');
            section.id = 'pubpriv-legend-section';
            section.style.cssText = 'padding:6px 2px 4px 2px;border-top:1px solid #ccc;margin-top:6px;';

            var titleEl = document.createElement('div');
            titleEl.style.cssText = 'font-size:11px;color:#555;font-weight:bold;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;';
            titleEl.textContent = '🏛️ Statut';
            section.appendChild(titleEl);

            [
                { label: 'Public', color: '#2196F3', icon: '🏛️' },
                { label: 'Privé',  color: '#9C27B0', icon: '🏫' }
            ].forEach(function(item) {
                var row = document.createElement('div');
                row.className = 'pubpriv-legend-row';

                var cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = true;
                cb.style.cssText = 'cursor:pointer;margin:0;width:13px;height:13px;flex-shrink:0;';

                var dot = document.createElement('span');
                dot.style.cssText = 'width:11px;height:11px;border-radius:50%;background:' + item.color + ';border:1.5px solid #444;flex-shrink:0;display:inline-block;';

                var lbl = document.createElement('span');
                lbl.style.cssText = 'font-size:12px;color:#333;display:flex;align-items:center;width:100%;justify-content:space-between;';
                lbl.innerHTML = '<span>' + item.icon + ' ' + item.label + '</span><span class="legend-counter" id="badge-count-' + item.label + '">0</span>';

                cb.addEventListener('change', function(e) {
                    e.stopPropagation();
                    pubPrivState[item.label] = cb.checked;
                    row.style.opacity = cb.checked ? '1' : '0.4';
                    applyTypeFilter();
                });
                cb.addEventListener('click', function(e) { e.stopPropagation(); });
                lbl.addEventListener('click', function() { cb.click(); });

                row.appendChild(cb);
                row.appendChild(dot);
                row.appendChild(lbl);
                section.appendChild(row);
            });

            layersList.appendChild(section);
        }

        setTimeout(function() {
            injectLegendCheckboxes();
            applyTypeFilter();
        }, 800);

        setTimeout(function() {
            injectPubPrivIntoLegend();
            updateStatsInLegend();
        }, 950);

        map.on('moveend', function() {
            updateStatsInLegend();
        });

        // ============================================================
        // FEATURES COMPLÉMENTAIRES
        // ============================================================

        // --- 1. Bouton Retour étendue initiale ---
        var initialBounds = [[47.58813635120763,7.537185090719699],[47.60294203369061,7.576745139155792]];
        var HomeControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function(map) {
                var btn = L.DomUtil.create('div', 'custom-map-btn leaflet-bar');
                btn.title = "Revenir à l'étendue initiale";
                btn.innerHTML = '🏠';
                L.DomEvent.on(btn, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    map.fitBounds(initialBounds);
                });
                L.DomEvent.disableClickPropagation(btn);
                return btn;
            }
        });
        new HomeControl().addTo(map);

        // --- 2. Bouton Géolocalisation ---
        var LocateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function(map) {
                var btn = L.DomUtil.create('div', 'custom-map-btn leaflet-bar');
                btn.title = 'Me localiser';
                btn.innerHTML = '📍';
                var locMarker = null;
                L.DomEvent.on(btn, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    btn.innerHTML = '⏳';
                    map.locate({ setView: true, maxZoom: 16 });
                });
                map.on('locationfound', function(e) {
                    btn.innerHTML = '📍';
                    if (locMarker) map.removeLayer(locMarker);
                    locMarker = L.circleMarker(e.latlng, {
                        radius: 9, color: '#1565C0', fillColor: '#42A5F5', fillOpacity: 0.9, weight: 2
                    }).addTo(map).bindPopup('📍 Vous êtes ici<br><small>' + e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5) + '</small>').openPopup();
                });
                map.on('locationerror', function() {
                    btn.innerHTML = '📍';
                    alert('Impossible de vous localiser. Vérifiez les autorisations de géolocalisation.');
                });
                L.DomEvent.disableClickPropagation(btn);
                return btn;
            }
        });
        new LocateControl().addTo(map);

        // --- 3. Bouton effacer filtre géo (bottomleft) ---
        var ClearGeoControl = L.Control.extend({
            options: { position: 'bottomleft' },
            onAdd: function(map) {
                var div = L.DomUtil.create('div', '');
                div.id = 'clear-geo-div';
                div.style.display = 'none';
                var btn = document.createElement('button');
                btn.innerHTML = '✖ Effacer le filtre géographique';
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    drawnItems.clearLayers();
                    geoFilterLayer = null;
                    div.style.display = 'none';
                    applyTypeFilter();
                });
                div.appendChild(btn);
                clearGeoBtnEl = div;
                L.DomEvent.disableClickPropagation(div);
                return div;
            }
        });
        new ClearGeoControl().addTo(map);

        // --- 4. Export Excel (bottomright) ---
        function exportToExcel() {
            var rows = [['Nom', 'Type', 'Statut', 'Adresse', 'Code postal', 'Commune', 'Téléphone', 'Email', 'Date ouverture', 'Latitude', 'Longitude']];
            layer_Typetablissement_3.eachLayer(function(mkr) {
                if (!mkr.feature || !mkr.feature.properties) return;
                var p      = mkr.feature.properties;
                var t      = p['Type_etab'] || '';
                var statut = (p['statut_public_prive'] || '').toLowerCase();
                var isPriv = statut.includes('priv');
                var showType   = typeFilterState[t] !== false;
                var showStatut = isPriv ? pubPrivState['Privé'] : pubPrivState['Public'];
                var showGeo    = true;
                if (geoFilterLayer) {
                    try { showGeo = pointInPolygon(mkr.getLatLng(), geoFilterLayer); } catch(e) { showGeo = true; }
                }
                if (!showType || !showStatut || !showGeo) return;
                var ll = mkr.getLatLng();
                rows.push([
                    p['nom_etablissement'] || '',
                    p['Type_etab'] || '',
                    p['statut_public_prive'] || '',
                    p['adresse_1'] || '',
                    p['code_postal'] || '',
                    p['nom_commune'] || '',
                    p['telephone'] || '',
                    p['mail'] || '',
                    p['date_ouverture'] || '',
                    ll ? ll.lat.toFixed(6) : '',
                    ll ? ll.lng.toFixed(6) : ''
                ]);
            });
            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = rows[0].map(function(h, i) {
                var max = h.length;
                rows.forEach(function(r) { if (r[i] && String(r[i]).length > max) max = String(r[i]).length; });
                return { wch: Math.min(max + 2, 40) };
            });
            XLSX.utils.book_append_sheet(wb, ws, 'Établissements');
            XLSX.writeFile(wb, 'ecoles_SNCF_GrandEst.xlsx');
        }

        var ExportControl = L.Control.extend({
            options: { position: 'bottomleft' },
            onAdd: function(map) {
                var div = L.DomUtil.create('div', '');
                div.id = 'export-div';
                var btn = document.createElement('button');
                btn.innerHTML = '📥 Exporter en Excel';
                btn.title = 'Exporter les établissements visibles vers Excel';
                btn.addEventListener('click', function(e) { e.stopPropagation(); exportToExcel(); });
                div.appendChild(btn);
                L.DomEvent.disableClickPropagation(div);
                return div;
            }
        });
        new ExportControl().addTo(map);

        // --- 5. Filtre géographique (polygone / rectangle) ---
        var drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                polygon: {
                    allowIntersection: false,
                    showArea: true,
                    shapeOptions: { color: '#E65100', weight: 2, fillOpacity: 0.07 }
                },
                rectangle: {
                    shapeOptions: { color: '#E65100', weight: 2, fillOpacity: 0.07 }
                },
                polyline:     false,
                circle:       false,
                circlemarker: false,
                marker:       false
            },
            edit: {
                featureGroup: drawnItems,
                remove:       false,
                edit:         false
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function(e) {
            drawnItems.clearLayers();
            drawnItems.addLayer(e.layer);
            geoFilterLayer = e.layer;
            applyTypeFilter();
        });

        // --- 6. Effet de survol sur les marqueurs ---
        layer_Typetablissement_3.eachLayer(function(mkr) {
            var baseRadius      = mkr.options ? (mkr.options.radius      || 8)   : 8;
            var baseWeight      = mkr.options ? (mkr.options.weight      || 1)   : 1;
            var baseFillOpacity = mkr.options ? (mkr.options.fillOpacity || 0.8) : 0.8;
            mkr.on('mouseover', function() {
                if (this.options.fillOpacity > 0) {
                    this.setStyle({ radius: baseRadius + 4, weight: 2.5, fillOpacity: 1 });
                    this.bringToFront();
                }
            });
            mkr.on('mouseout', function() {
                var t      = this.feature.properties['Type_etab'] || '';
                var statut = (this.feature.properties['statut_public_prive'] || '').toLowerCase();
                var isPriv = statut.includes('priv');
                var show   = (typeFilterState[t] !== false)
                          && (isPriv ? pubPrivState['Privé'] : pubPrivState['Public']);
                if (show && geoFilterLayer) {
                    try { show = pointInPolygon(this.getLatLng(), geoFilterLayer); } catch(e) { show = true; }
                }
                this.setStyle({
                    radius:      baseRadius,
                    weight:      baseWeight,
                    opacity:     show ? 0.9 : 0,
                    fillOpacity: show ? baseFillOpacity : 0
                });
            });
        });
// ============================================================
        // EXTENSION : CALCUL DE DISTANCE SANS TOUCHER AU CODE ORIGINAL
        // ============================================================
        
        // Fonction utilitaire pour calculer la distance la plus courte entre un point et une ligne (calcul géodésique Leaflet)
        function getMinDistanceToLines(latlng, lineLayer) {
            var minDistance = Infinity;
            
            lineLayer.eachLayer(function(layer) {
                if (typeof layer.getLatLngs !== 'function') return;
                var latlngs = layer.getLatLngs();
                
                // Gestion des MultiLineString ou LineString simples
                function checkCoords(coords) {
                    if (Array.isArray(coords) && coords[0] instanceof L.LatLng) {
                        for (var i = 0; i < coords.length; i++) {
                            var dist = latlng.distanceTo(coords[i]);
                            if (dist < minDistance) minDistance = dist;
                        }
                    } else if (Array.isArray(coords)) {
                        coords.forEach(checkCoords);
                    }
                }
                checkCoords(latlngs);
            });
            
            return minDistance;
        }

        // Écouteur global sur l'ouverture des popups pour injecter la distance
        map.on('popupopen', function(e) {
            var popup = e.popup;
            var source = popup._source;
            
            // On vérifie que la popup provient bien d'un marqueur de la couche des établissements
            if (source && source instanceof L.CircleMarker && source.feature && source.feature.properties && source.feature.properties['Type_etab']) {
                var schoolLatLng = source.getLatLng();
                
                // Calcul de la distance minimale par rapport à la couche des voies SNCF (layer_geo_voies_2)
                var rawDistance = getMinDistanceToLines(schoolLatLng, layer_geo_voies_2);
                
                if (rawDistance !== Infinity) {
                    // Arrondi à 10 mètres près
                    var roundedDistance = Math.round(rawDistance / 10) * 10;
                    
                    // Formatage de l'affichage (ex: 450 m ou 1.2 km)
                    var distanceStr = "";
                    if (roundedDistance >= 1000) {
                        distanceStr = (roundedDistance / 1000).toFixed(2) + " km";
                    } else {
                        distanceStr = roundedDistance + " m";
                    }
                    
                    // Construction du bloc HTML à injecter
                    var distanceHtml = '<div style="font-size:13px; font-weight:bold; color:#E65100; margin-top:8px; border-top:1px dashed #ccc; padding-top:5px; display:flex; align-items:center; gap:5px;">' +
                                       '🚄 Distance voie SNCF : ~ ' + distanceStr + 
                                       '</div>';
                    
                    // Récupération du contenu actuel de la popup
                    var currentContent = popup.getContent();
                    
                    // Si la distance n'a pas déjà été injectée (sécurité pour éviter les doublons)
                    if (typeof currentContent === 'string' && !currentContent.includes('Distance voie SNCF')) {
                        // On cherche la dernière balise </div> pour insérer notre bloc juste avant la fin du conteneur principal
                        var lastDivIndex = currentContent.lastIndexOf('</div>');
                        if (lastDivIndex !== -1) {
                            var newContent = currentContent.substring(0, lastDivIndex) + distanceHtml + currentContent.substring(lastDivIndex);
                            popup.setContent(newContent);
                            popup.update(); // Force Leaflet à recalculer la taille de la bulle
                        }
                    }
                }
            }
        });
        // ============================================================
        // FIN DU SCRIPT
        // ============================================================

        </script>
